<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI Tutorial</title>
    <style>
        :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { margin: 0; background: #0b1224; color: #e8eefc; }
        main { width: min(860px, calc(100% - 32px)); margin: 48px auto; }
        h1 { margin-bottom: 8px; }
        .subtitle { color: #91a1c5; margin-top: 0; }
        #messages { min-height: 360px; padding: 20px; background: #111b33; border: 1px solid #26365d; border-radius: 16px; }
        .message { max-width: 80%; margin: 12px 0; padding: 12px 16px; border-radius: 12px; white-space: pre-wrap; line-height: 1.6; }
        .user { margin-left: auto; background: #2563eb; }
        .assistant { background: #1d2a49; }
        form { display: flex; gap: 10px; margin-top: 16px; }
        select { padding: 0 12px; color: white; background: #111b33; border: 1px solid #33466f; border-radius: 10px; font-size: 14px; }
        input { flex: 1; padding: 14px 16px; color: white; background: #111b33; border: 1px solid #33466f; border-radius: 10px; font-size: 16px; }
        button { padding: 0 22px; color: white; background: #10b981; border: 0; border-radius: 10px; cursor: pointer; font-size: 16px; }
        button:disabled { opacity: .5; cursor: not-allowed; }
        .hint { color: #7183aa; font-size: 13px; }
    </style>
</head>
<body>
<main>
    <h1>Spring AI Chat</h1>
    <p class="subtitle">ChatClient 流式输出示例</p>

    <section id="messages">
        <div class="message assistant">你好！请输入一个问题，我会通过流式接口逐字回复。</div>
    </section>

    <form id="chat-form">
        <select id="mode-select" title="选择接口">
            <option value="chat">普通聊天（流式）</option>
            <option value="prompt">Prompt 教师模式</option>
            <option value="template">Prompt 模板模式</option>
            <option value="few-shot">Few-shot 示例模式</option>
            <option value="format">格式约束模式</option>
            <option value="structured">结构化输出模式</option>
            <option value="structured-safe">结构化输出（异常处理）</option>
            <option value="validated">结构化输出（字段校验）</option>
            <option value="retry">结构化输出（自动重试）</option>
            <option value="retry-custom">结构化输出（自定义重试）</option>
            <option value="native">模型原生结构化输出</option>
            <option value="memory">Memory 多轮对话</option>
            <option value="custom-memory">自定义 Memory 窗口（4 条）</option>
            <option value="system-memory">SystemMessage + Memory</option>
            <option value="system-aware-memory">系统消息固定保留</option>
            <option value="first-user-memory">第一条用户消息 + 最近4条</option>
            <option value="token-memory">Token 窗口（1000 tokens）</option>
            <option value="summary-memory">摘要记忆（摘要 + 最近4条）</option>
        </select>
        <input id="message-input" placeholder="例如：什么是 Spring AI？" autocomplete="off">
        <button id="send-button" type="submit">发送</button>
    </form>
    <p class="hint">提示：先设置 RAG_DEEPSEEK_API_KEY，再执行 mvn spring-boot:run。</p>
</main>

<script>
    const form = document.querySelector('#chat-form');
    const input = document.querySelector('#message-input');
    const sendButton = document.querySelector('#send-button');
    const messages = document.querySelector('#messages');
    const modeSelect = document.querySelector('#mode-select');

    function addMessage(text, type) {
        const element = document.createElement('div');
        element.className = `message ${type}`;
        element.textContent = text;
        messages.appendChild(element);
        messages.scrollTop = messages.scrollHeight;
        return element;
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const question = input.value.trim();
        if (!question) return;

        addMessage(question, 'user');
        input.value = '';
        input.disabled = true;
        sendButton.disabled = true;
        const answer = addMessage('', 'assistant');

        try {
            const mode = modeSelect.value;
            const endpoint = mode === 'prompt'
                ? `/ai/prompt?question=${encodeURIComponent(question)}`
                : mode === 'template'
                    ? `/ai/prompt/template?topic=${encodeURIComponent(question)}`
                    : mode === 'few-shot'
                        ? `/ai/prompt/few-shot?question=${encodeURIComponent(question)}`
                        : mode === 'format'
                            ? `/ai/prompt/format?question=${encodeURIComponent(question)}`
                            : mode === 'structured'
                                ? `/ai/structured-output?topic=${encodeURIComponent(question)}`
                                : mode === 'structured-safe'
                                    ? `/ai/structured-output/safe?topic=${encodeURIComponent(question)}`
                                    : mode === 'validated'
                                        ? `/ai/structured-output/validated?topic=${encodeURIComponent(question)}`
                                        : mode === 'retry'
                                            ? `/ai/structured-output/retry?topic=${encodeURIComponent(question)}`
                                            : mode === 'retry-custom'
                                                ? `/ai/structured-output/retry/custom?topic=${encodeURIComponent(question)}`
                                                : mode === 'native'
                                                    ? `/ai/structured-output/native?topic=${encodeURIComponent(question)}`
                                                    : mode === 'memory'
                                                        ? `/ai/memory/chat?conversationId=web-demo&message=${encodeURIComponent(question)}`
                                                        : mode === 'custom-memory'
                                                            ? `/ai/memory/custom-window?conversationId=custom-window-demo&message=${encodeURIComponent(question)}`
                                                            : mode === 'system-memory'
                                                                ? `/ai/memory/system-message?conversationId=system-message-demo&message=${encodeURIComponent(question)}`
                                                                : mode === 'system-aware-memory'
                                                                    ? `/ai/memory/system-aware?conversationId=system-aware-demo&message=${encodeURIComponent(question)}`
                                                                        : mode === 'first-user-memory'
                                                                            ? `/ai/memory/first-user?conversationId=first-user-demo&message=${encodeURIComponent(question)}`
                                                                                : mode === 'token-memory'
                                                                                    ? `/ai/memory/token-window?conversationId=token-window-demo&message=${encodeURIComponent(question)}`
                                                                                    : mode === 'summary-memory'
                                                                                        ? `/ai/memory/summary?conversationId=summary-demo&message=${encodeURIComponent(question)}`
                        : `/ai/chat/stream?message=${encodeURIComponent(question)}`;
            const response = await fetch(endpoint);
            if (!response.ok || !response.body) throw new Error(`请求失败：${response.status}`);

            // Prompt 教师和结构化输出接口是同步接口，直接显示完整文本。
            if (mode === 'prompt' || mode === 'structured' || mode === 'structured-safe' || mode === 'validated' || mode === 'retry' || mode === 'retry-custom' || mode === 'native') {
                const text = await response.text();
                try {
                    // JSON 结果格式化显示，便于观察 Java 对象的字段结构。
                    answer.textContent = JSON.stringify(JSON.parse(text), null, 2);
                } catch {
                    answer.textContent = text;
                }
                return;
            }

            // 普通聊天、Prompt 模板、Few-shot 和格式约束接口都是 SSE 流式接口。
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const {value, done} = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, {stream: true});

                // Spring 的 SSE 响应以 data: 开头；逐段追加到当前回答。
                const lines = buffer.split('\n');
                buffer = lines.pop();
                for (const line of lines) {
                    if (line.startsWith('data:')) {
                        answer.textContent += line.slice(5).trimStart();
                        messages.scrollTop = messages.scrollHeight;
                    }
                }
            }
        } catch (error) {
            answer.textContent = `请求失败：${error.message}`;
        } finally {
            input.disabled = false;
            sendButton.disabled = false;
            input.focus();
        }
    });
</script>
</body>
</html>
