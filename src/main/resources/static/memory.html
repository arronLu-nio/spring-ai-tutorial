<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI 会话管理</title>
    <style>
        :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { margin: 0; background: #0b1224; color: #e8eefc; }
        .layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
        aside { padding: 24px 16px; background: #111b33; border-right: 1px solid #26365d; }
        main { width: min(820px, calc(100% - 32px)); margin: 40px auto; }
        h1 { margin: 0 0 8px; font-size: 24px; }
        .muted { color: #91a1c5; font-size: 13px; }
        button, input { border: 1px solid #33466f; border-radius: 10px; color: white; background: #172442; }
        button { padding: 10px 14px; cursor: pointer; }
        button.primary { width: 100%; margin: 18px 0; background: #10b981; border: 0; }
        button.danger { color: #fecaca; }
        input { box-sizing: border-box; width: 100%; padding: 12px; }
        .conversation { display: flex; gap: 8px; align-items: center; padding: 11px 8px; margin: 4px 0; border-radius: 8px; cursor: pointer; }
        .conversation:hover, .conversation.active { background: #20345d; }
        .conversation-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #messages { min-height: 430px; padding: 20px; background: #111b33; border: 1px solid #26365d; border-radius: 16px; }
        .message { max-width: 80%; margin: 12px 0; padding: 12px 16px; border-radius: 12px; white-space: pre-wrap; line-height: 1.6; }
        .user { margin-left: auto; background: #2563eb; }
        .assistant { background: #1d2a49; }
        form { display: flex; gap: 10px; margin-top: 16px; }
        form input { flex: 1; }
        form button { background: #10b981; border: 0; }
        form button:disabled { opacity: .5; }
        .empty { color: #7183aa; text-align: center; padding: 20px 0; }
        @media (max-width: 700px) { .layout { grid-template-columns: 1fr; } aside { border-right: 0; border-bottom: 1px solid #26365d; } }
    </style>
</head>
<body>
<div class="layout">
    <aside>
        <h1>会话</h1>
        <div class="muted">会话目录只保存在 Redis，默认 24 小时过期。</div>
        <button class="primary" id="new-conversation">+ 新建会话</button>
        <div id="conversation-list"></div>
    </aside>
    <main>
        <h1 id="current-title">请选择一个会话</h1>
        <p class="muted" id="current-id"></p>
        <button id="clear-messages" class="danger">清空当前消息</button>
        <section id="messages"><div class="empty">新建或选择会话后开始聊天</div></section>
        <form id="chat-form">
            <input id="message-input" placeholder="请输入消息..." autocomplete="off">
            <button id="send-button" type="submit">发送</button>
        </form>
    </main>
</div>
<script>
    const list = document.querySelector('#conversation-list');
    const messages = document.querySelector('#messages');
    const input = document.querySelector('#message-input');
    const sendButton = document.querySelector('#send-button');
    const clearMessages = document.querySelector('#clear-messages');
    let currentConversation = null;

    function addMessage(text, type) {
        const element = document.createElement('div');
        element.className = `message ${type}`;
        element.textContent = text;
        messages.appendChild(element);
        messages.scrollTop = messages.scrollHeight;
        return element;
    }

    async function loadConversations() {
        const response = await fetch('/api/conversations');
        const conversations = await response.json();
        list.replaceChildren();
        if (!conversations.length) {
            list.innerHTML = '<div class="empty">暂无会话</div>';
            return;
        }
        conversations.forEach(conversation => {
            const item = document.createElement('div');
            item.className = `conversation ${currentConversation?.id === conversation.id ? 'active' : ''}`;
            item.innerHTML = `<span class="conversation-title"></span><button class="danger">删除</button>`;
            item.querySelector('.conversation-title').textContent = conversation.title;
            item.querySelector('.conversation-title').onclick = () => selectConversation(conversation);
            item.querySelector('.danger').onclick = async event => {
                event.stopPropagation();
                await fetch(`/api/conversations/${conversation.id}`, { method: 'DELETE' });
                if (currentConversation?.id === conversation.id) {
                    currentConversation = null;
                    document.querySelector('#current-title').textContent = '请选择一个会话';
                    document.querySelector('#current-id').textContent = '';
                    messages.innerHTML = '<div class="empty">新建或选择会话后开始聊天</div>';
                }
                await loadConversations();
            };
            list.appendChild(item);
        });
    }

    function selectConversation(conversation) {
        currentConversation = conversation;
        document.querySelector('#current-title').textContent = conversation.title;
        document.querySelector('#current-id').textContent = conversation.id;
        messages.innerHTML = '<div class="empty">开始发送消息吧</div>';
        loadConversations();
    }

    clearMessages.onclick = async () => {
        if (!currentConversation || !confirm('确定清空当前会话的所有消息吗？')) return;
        await fetch(`/api/conversations/${currentConversation.id}/messages`, { method: 'DELETE' });
        messages.innerHTML = '<div class="empty">消息已清空，可以重新开始</div>';
        await loadConversations();
    };

    document.querySelector('#new-conversation').onclick = async () => {
        const title = prompt('请输入会话名称', '新会话');
        if (title === null) return;
        const response = await fetch(`/api/conversations?title=${encodeURIComponent(title)}`, { method: 'POST' });
        selectConversation(await response.json());
    };

    document.querySelector('#chat-form').onsubmit = async event => {
        event.preventDefault();
        const question = input.value.trim();
        if (!question || !currentConversation) return;
        addMessage(question, 'user');
        input.value = '';
        input.disabled = true;
        sendButton.disabled = true;
        const answer = addMessage('', 'assistant');
        try {
            const response = await fetch(`/ai/memory/chat?conversationId=${encodeURIComponent(currentConversation.id)}&message=${encodeURIComponent(question)}`);
            if (!response.ok || !response.body) throw new Error(`请求失败：${response.status}`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();
                lines.filter(line => line.startsWith('data:')).forEach(line => answer.textContent += line.slice(5).trimStart());
                messages.scrollTop = messages.scrollHeight;
            }
            await loadConversations();
        } catch (error) {
            answer.textContent = `请求失败：${error.message}`;
        } finally {
            input.disabled = false;
            sendButton.disabled = false;
            input.focus();
        }
    };

    loadConversations();
</script>
</body>
</html>
